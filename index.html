<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RuqyaTech</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: black;
}

.nav-buttons button,
.lang-switch button {
    margin: 5px;
    padding: 8px 18px;
    border: none;
    background: #1e293b;
    color: white;
    cursor: pointer;
    border-radius: 20px;
}

button.active {
    background: gold;
    color: black;
}

/* HERO */
.hero {
    height: 90vh;
    background-size: cover;
    background-position: center;
    position: relative;
}

#ruqyaHero {
    background-image: url("ruqya-poster.jpg"); /* CHANGE HERE */
}

#academyHero {
    background-image: url("academy-poster.jpg"); /* CHANGE HERE */
}

.overlay {
    background: rgba(0,0,0,0.75);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.overlay h1 {
    font-size: 3rem;
    color: gold;
}

/* SECTION */
.section {
    display: none;
}
.active-section {
    display: block;
}

/* CONTENT */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    margin: 20px 0;
    opacity: 0;
    transform: translateY(40px);
    transition: 0.6s ease;
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

.card h3 {
    color: gold;
}

/* CONTACT BUTTON */
.whatsapp-btn {
    display: inline-block;
    padding: 12px 20px;
    background: #25D366;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-buttons">
        <button class="active" onclick="showTab('ruqya')">Ruqya</button>
        <button onclick="showTab('academy')">Academy</button>
    </div>

    <div class="lang-switch">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('ur')">UR</button>
        <button onclick="setLang('ar')">AR</button>
    </div>
</div>

<!-- RUQYA -->
<div id="ruqya" class="section active-section">
    <div id="ruqyaHero" class="hero">
        <div class="overlay">
            <h1 data-en="Healing Through Quran & Sunnah"
                data-ur="قرآن و سنت کے ذریعے شفا"
                data-ar="الشفاء بالقرآن والسنة">
                Healing Through Quran & Sunnah
            </h1>
        </div>
    </div>

    <div class="container">

        <div class="card">
            <p data-en="Authentic Ruqya services based on Qur’an & Sunnah."
               data-ur="قرآن و سنت پر مبنی مستند رقیہ خدمات"
               data-ar="خدمات رقية شرعية وفق القرآن والسنة">
               Authentic Ruqya services based on Qur’an & Sunnah.
            </p>
        </div>

        <div class="card">
            <h3>Treatments</h3>
            <ul>
                <li>Evil Eye</li>
                <li>Black Magic</li>
                <li>Envy</li>
                <li>Anxiety</li>
            </ul>
        </div>

        <a class="whatsapp-btn" href="https://wa.me/923458556748">WhatsApp</a>

    </div>
</div>

<!-- ACADEMY -->
<div id="academy" class="section">
    <div id="academyHero" class="hero">
        <div class="overlay">
            <h1 data-en="Quran Learning Made Easy"
                data-ur="قرآن سیکھنا اب آسان"
                data-ar="تعلم القرآن بسهولة">
                Quran Learning Made Easy
            </h1>
        </div>
    </div>

    <div class="container">

        <div class="card">
            <h3>Courses</h3>
            <ul>
                <li>Quran with Tajweed</li>
                <li>Female Teachers</li>
                <li>1-on-1 Classes</li>
            </ul>
        </div>

        <div class="card">
            <h3>Fees</h3>
            <p>$35 / $30</p>
        </div>

    </div>
</div>

<footer>© RuqyaTech</footer>

<script>

/* TAB SWITCH */
function showTab(tabId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
    document.getElementById(tabId).classList.add('active-section');
}

/* LANGUAGE SWITCH */
function setLang(lang) {
    document.querySelectorAll('[data-en]').forEach(el => {
        el.innerText = el.getAttribute('data-' + lang);
    });
}

/* SCROLL ANIMATION */
window.addEventListener('scroll', () => {
    document.querySelectorAll('.card').forEach(card => {
        let top = card.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            card.classList.add('show');
        }
    });
});

</script>

</body>
</html>
